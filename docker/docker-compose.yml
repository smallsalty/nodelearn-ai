services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - path: ../backend/.env.example
        required: true
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://nodelearn:nodelearn@postgres:5432/nodelearn
      JUDGE0_BASE_URL: http://judge0-server:2358
      JUDGE0_AUTH_TOKEN: ""
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage
    depends_on:
      - postgres
      - redis
      - neo4j
      - chroma
      - judge0-server

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nodelearn
      POSTGRES_USER: nodelearn
      POSTGRES_PASSWORD: nodelearn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/nodelearn
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  judge0-server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-postgres
      - judge0-redis

  judge0-worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-postgres
      - judge0-redis

  judge0-postgres:
    image: postgres:16.2
    env_file:
      - judge0.conf
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7.2.4
    command: ["bash", "-c", "docker-entrypoint.sh --appendonly no --requirepass $$REDIS_PASSWORD"]
    env_file:
      - judge0.conf

  # TODO: add MySQL profile if the project chooses MySQL instead of PostgreSQL.
  # TODO: add FAISS file-volume adapter if VECTOR_STORE_TYPE=faiss.

volumes:
  postgres_data:
  neo4j_data:
  chroma_data:
  judge0_postgres_data:
