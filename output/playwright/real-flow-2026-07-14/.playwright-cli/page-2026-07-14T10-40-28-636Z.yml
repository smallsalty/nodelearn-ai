              - paragraph [ref=f11e558]: 汉诺塔问题源自一个古老的传说：有三根柱子 A、B、C，初始时 A 柱上套有 n 个大小不同的圆盘，大的在下，小的在上。要求将所有圆盘移动到 C 柱，每次只能移动一个圆盘，且任何时刻都不能将较大的圆盘放在较小的圆盘上。你可以借助 B 柱。请编写程序，输出具体的移动步骤。
              - heading "输入格式" [level=4] [ref=f11e559]
              - paragraph [ref=f11e560]: 第一行包含一个整数 n (1 ≤ n ≤ 12)，表示盘子的数量。
              - heading "输出格式" [level=4] [ref=f11e561]
              - paragraph [ref=f11e562]: 输出移动盘子的步骤，每行一个移动，格式为 "from->to"，其中 from 和 to 是 'A'、'B'、'C' 中的一个字符。初始时所有盘子在 A 柱，目标是将所有盘子移动到 C 柱。
              - heading "约束" [level=4] [ref=f11e563]
              - paragraph [ref=f11e564]: 1 ≤ n ≤ 12
              - heading "样例" [level=4] [ref=f11e565]
