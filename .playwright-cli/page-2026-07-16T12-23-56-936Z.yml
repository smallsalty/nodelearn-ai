                    - heading "算法学习路线" [level=2] [ref=f2e879]
                    - paragraph [ref=f2e880]: 从总体上看，我们可以将学习数据结构与算法的过程划分为三个阶段。
                    - list [ref=f2e881]:
                      - listitem [ref=f2e882]:
                        - strong [ref=f2e883]: 阶段一：算法入门
                        - text: 。我们需要熟悉各种数据结构的特点和用法，学习不同算法的原理、流程、用途和效率等方面的内容。
                      - listitem [ref=f2e884]:
                        - strong [ref=f2e885]: 阶段二：刷算法题
                        - text: 。建议从热门题目开刷，先积累至少 100 道题目，熟悉主流的算法问题。初次刷题时，“知识遗忘”可能是一个挑战，但请放心，这是很正常的。我们可以按照“艾宾浩斯遗忘曲线”来复习题目，通常在进行 3～5 轮的重复后，就能将其牢记在心。推荐的题单和刷题计划请见此
                        - link "GitHub 仓库" [ref=f2e886] [cursor=pointer]:
                          - /url: https://github.com/krahets/LeetCode-Book
                        - text: 。
                      - listitem [ref=f2e887]:
                        - strong [ref=f2e888]: 阶段三：搭建知识体系
                        - text: 。在学习方面，我们可以阅读算法专栏文章、解题框架和算法教材，以不断丰富知识体系。在刷题方面，可以尝试采用进阶刷题策略，如按专题分类、一题多解、一解多题等，相关的刷题心得可以在各个社区找到。
                    - paragraph [ref=f2e889]: 如下图所示，本书内容主要涵盖“阶段一”，旨在帮助你更高效地展开阶段二和阶段三的学习。
