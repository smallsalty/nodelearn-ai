                    - paragraph [ref=f2e863]:
                      - strong [ref=f2e864]: 第三步：运行源代码
                      - text: 。如下图所示，对于顶部标有文件名称的代码块，我们可以在仓库的
                      - code [ref=f2e865]: codes
                      - text: 文件夹内找到对应的源代码文件。源代码文件可一键运行，将帮助你节省不必要的调试时间，让你能够专注于学习内容。
