                      - text: 在阅读本书时，请不要轻易跳过那些没学明白的知识点。
                      - strong [ref=f2e875]: 欢迎在评论区提出你的问题
                      - text: ，我和小伙伴们将竭诚为你解答，一般情况下可在两天内回复。
                    - paragraph [ref=f2e876]: 如下图所示，网页版每个章节的底部都配有评论区。希望你能多关注评论区的内容。一方面，你可以了解大家遇到的问题，从而查漏补缺，激发更深入的思考。另一方面，期待你能慷慨地回答其他小伙伴的问题，分享你的见解，帮助他人进步。
