                    - paragraph [ref=f2e850]: 运行代码的前置工作主要分为三步。
                    - paragraph [ref=f2e851]:
                      - strong [ref=f2e852]: 第一步：安装本地编程环境
                      - text: 。请参照附录所示的
                      - link "教程" [ref=f2e853] [cursor=pointer]:
