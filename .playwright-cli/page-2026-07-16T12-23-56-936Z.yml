                      - text: ，可以通过以下命令克隆本仓库：
                    - code [ref=f2e859]: git clone https://github.com/krahets/hello-algo.git
                    - paragraph [ref=f2e860]: 当然，你也可以在下图所示的位置，点击“Download ZIP”按钮直接下载代码压缩包，然后在本地解压即可。
