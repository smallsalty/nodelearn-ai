                        - text: ，这类文字值得特别关注。
                      - listitem [ref=f2e821]: 有特指含义的词句会使用“引号”标注，以避免歧义。
                      - listitem [ref=f2e822]:
                        - text: 当涉及编程语言之间不一致的名词时，本书均以 Python 为准，例如使用
                        - code [ref=f2e823]: None
