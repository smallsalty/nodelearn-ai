                    - heading "0.1 关于本书" [level=3] [ref=e759]
                  - article [ref=e763]:
                    - paragraph [ref=e764]: 本项目旨在创建一本开源、免费、对新手友好的数据结构与算法入门教程。
                    - list [ref=e765]:
                      - listitem [ref=e766]: 全书采用动画图解，内容清晰易懂、学习曲线平滑，引导初学者探索数据结构与算法的知识地图。
                      - listitem [ref=e767]: 源代码可一键运行，帮助读者在练习中提升编程技能，了解算法工作原理和数据结构底层实现。
                      - listitem [ref=e768]: 提倡读者互助学习，欢迎大家在评论区提出问题与分享见解，在交流讨论中共同进步。
                    - heading "读者对象" [level=2] [ref=e769]
                    - paragraph [ref=e770]: 若你是算法初学者，从未接触过算法，或者已经有一些刷题经验，对数据结构与算法有模糊的认识，在会与不会之间反复横跳，那么本书正是为你量身定制的！
                    - paragraph [ref=e771]: 如果你已经积累一定的刷题量，熟悉大部分题型，那么本书可助你回顾与梳理算法知识体系，仓库源代码可以当作“刷题工具库”或“算法字典”来使用。
                    - paragraph [ref=e772]:
                      - text: 若你是算法“大神”，我们期待收到你的宝贵建议，或者
                      - link "一起参与创作" [ref=e773] [cursor=pointer]:
                        - /url: https://www.hello-algo.com/chapter_appendix/contribution/
                      - text: 。
                    - blockquote [ref=e774]:
                      - paragraph [ref=e775]:
                        - strong [ref=e776]: 前置条件
                      - paragraph [ref=e777]: 你需要至少具备任一语言的编程基础，能够阅读和编写简单代码。
                    - heading "内容结构" [level=2] [ref=e778]
                    - paragraph [ref=e779]: 本书的主要内容如下图所示。
                    - list [ref=e780]:
                      - listitem [ref=e781]:
                        - strong [ref=e782]: 复杂度分析
                        - text: ：数据结构和算法的评价维度与方法。时间复杂度和空间复杂度的推算方法、常见类型、示例等。
                      - listitem [ref=e783]:
                        - strong [ref=e784]: 数据结构
                        - text: ：基本数据类型和数据结构的分类方法。数组、链表、栈、队列、哈希表、树、堆、图等数据结构的定义、优缺点、常用操作、常见类型、典型应用、实现方法等。
                      - listitem [ref=e785]:
                        - strong [ref=e786]: 算法
                        - text: ：搜索、排序、分治、回溯、动态规划、贪心等算法的定义、优缺点、效率、应用场景、解题步骤和示例问题等。
